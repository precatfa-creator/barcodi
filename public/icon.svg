<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#7DA78C" />
      <stop offset="50%" stop-color="#35858E" />
      <stop offset="100%" stop-color="#245d63" />
    </radialGradient>
    <linearGradient id="laser" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6EEC9" stop-opacity="0" />
      <stop offset="20%" stop-color="#C2D099" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#E6EEC9" stop-opacity="1" />
      <stop offset="80%" stop-color="#C2D099" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#E6EEC9" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bg)" />

  <!-- Scanner Target Framing corners -->
  <path d="M 120,150 L 120,120 L 150,120" stroke="#E6EEC9" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9" />
  <path d="M 392,150 L 392,120 L 362,120" stroke="#E6EEC9" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9" />
  <path d="M 120,362 L 120,392 L 150,392" stroke="#E6EEC9" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9" />
  <path d="M 392,362 L 392,392 L 362,392" stroke="#E6EEC9" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9" />

  <!-- Barcode Graphics -->
  <g fill="#FFFFFF" opacity="0.95">
    <!-- Barcode strips -->
    <rect x="156" y="160" width="16" height="192" rx="4" />
    <rect x="188" y="160" width="8" height="192" rx="3" />
    <rect x="208" y="160" width="24" height="192" rx="6" />
    <rect x="244" y="160" width="12" height="192" rx="4" />
    <rect x="268" y="160" width="8" height="192" rx="3" />
    <rect x="288" y="160" width="32" height="192" rx="6" />
    <rect x="332" y="160" width="12" height="192" rx="4" />
    <rect x="356" y="160" width="16" height="192" rx="4" />
  </g>

  <!-- Red/Laser active scanline -->
  <g filter="url(#glow)">
    <!-- Horizontal laser light -->
    <rect x="80" y="250" width="352" height="12" rx="6" fill="url(#laser)" />
    <!-- Secondary laser beam center -->
    <line x1="90" y1="256" x2="422" y2="256" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
